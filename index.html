<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pivní Mapa — Co se kde točí a za kolik</title>
    
    <!-- Google Fonts: Inter and Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Leaflet CSS for Interactive Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Leaflet JavaScript CDN -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #0f1115;
        font-family: 'Inter', -apple-system, sans-serif;
      }
      
      /* Smooth transitions for Leaflet popups and elements */
      .leaflet-popup-content-wrapper {
        background-color: #1a1d24 !important;
        color: #f3f4f6 !important;
        border-radius: 12px !important;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4) !important;
        border: 1px solid rgba(245, 158, 11, 0.2) !important;
        font-family: 'Inter', sans-serif !important;
      }
      .leaflet-popup-tip {
        background-color: #1a1d24 !important;
        border: 1px solid rgba(245, 158, 11, 0.2) !important;
      }
      .leaflet-container {
        font-family: 'Inter', sans-serif !important;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
